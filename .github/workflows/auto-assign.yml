name: Auto Assign Contributor

on:
  issue_comment:
    types:
      - created

concurrency:
  group: auto-assign-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  assign:
    name: Assign Contributor
    if: ${{ github.event.issue.pull_request == null && (contains(github.event.comment.body, '/assign') || contains(github.event.comment.body, '@Shiv24angi')) }}
    runs-on: ubuntu-latest

    permissions:
      # Required to add assignees and create comments on issues
      issues: write

    steps:
      - name: Auto Assign
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799fd4e # v7.0.1
        with:
          script: |
            try {
              const owner = 'Shiv24angi';
              const repo = 'EcoVerse';
              const issue_number = context.issue.number;
              const commenter = context.payload.comment.user.login;

              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number,
              });

              const assignees = issue.assignees || [];

              const isAlreadyAssigned = assignees.some(a => a.login === commenter);

              if (isAlreadyAssigned) {
                return;
              }

              if (assignees.length > 0) {
                const currentAssignee = assignees[0].login;
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: `This issue is currently assigned to @${currentAssignee}. Please look for another unassigned issue.`,
                });
                return;
              }

              const { data: allIssues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                assignee: commenter,
              });

              const otherAssignedIssues = allIssues.filter(
                (i) => i.number !== issue_number
              );

              if (otherAssignedIssues.length >= 3) {
                const issueList = otherAssignedIssues
                  .slice(0, 3)
                  .map((i) => `#${i.number}`)
                  .join(', ');
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: `Hey @${commenter}! Our policy allows a maximum of 3 issues per contributor at a time. You are currently assigned to ${issueList}. Please resolve them first before taking on a new issue.`,
                });
                return;
              }

              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [commenter],
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Assigned @${commenter} to this issue. Thank you for contributing! If you enjoy the project, consider giving the repository a 🌟.`,
              });

            } catch (error) {
              console.error('Error in auto-assign workflow:', error);
              await github.rest.issues.createComment({
                owner: 'Shiv24angi',
                repo: 'EcoVerse',
                issue_number: context.issue.number,
                body: `Sorry, an error occurred while processing your assignment request. Please try again or contact a maintainer.`,
              }).catch(() => {});
            }
